<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - ShopVerse</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a class="logo" href="/">Shop<span>Verse</span></a>
  <ul class="nav-links" id="nav-user-area"></ul>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>👋 Welcome Back</h2>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>
    <button class="btn btn-primary btn-block" onclick="login()">Login</button>
    <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted)">
      Don't have an account? <a href="/pages/register.html" style="color:var(--primary)">Sign Up</a>
    </p>
    <div style="margin-top:1rem;padding:1rem;background:rgba(108,99,255,0.1);border-radius:10px;font-size:0.85rem;">
      <strong>Demo Accounts:</strong><br>
      Admin: admin@shop.com / admin123<br>
      User: john@example.com / john123
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/app.js"></script>
<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) return showToast('Please fill all fields', 'warning');
  try {
    const user = await api('POST', '/auth/login', { email, password });
    localStorage.setItem('token', user.token);
    localStorage.setItem('user', JSON.stringify(user));
    showToast(`Welcome back, ${user.name}! 🎉`);
    setTimeout(() => window.location = '/', 1000);
  } catch (err) {
    showToast(err.message, 'error');
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
