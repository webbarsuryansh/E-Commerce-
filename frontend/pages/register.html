<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - ShopVerse</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a class="logo" href="/">Shop<span>Verse</span></a>
  <ul class="nav-links" id="nav-user-area"></ul>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>🚀 Create Account</h2>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="john@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm your password">
    </div>
    <button class="btn btn-primary btn-block" onclick="register()">Create Account</button>
    <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted)">
      Already have an account? <a href="/pages/login.html" style="color:var(--primary)">Login</a>
    </p>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/app.js"></script>
<script>
async function register() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  if (!name || !email || !password) return showToast('Please fill all fields', 'warning');
  if (password !== confirmPassword) return showToast('Passwords do not match', 'error');
  if (password.length < 6) return showToast('Password must be at least 6 characters', 'warning');
  try {
    const user = await api('POST', '/auth/register', { name, email, password });
    localStorage.setItem('token', user.token);
    localStorage.setItem('user', JSON.stringify(user));
    showToast('Account created successfully! 🎉');
    setTimeout(() => window.location = '/', 1000);
  } catch (err) {
    showToast(err.message, 'error');
  }
}
</script>
</body>
</html>
